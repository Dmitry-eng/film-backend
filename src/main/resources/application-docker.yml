spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kino_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  data:
    redis:
      host: redis
      port: 6379

minio:
  url: http://minio:9000
  username: admin
  password: password